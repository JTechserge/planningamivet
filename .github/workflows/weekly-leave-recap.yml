name: Récapitulatif des congés ASV en attente

on:
  schedule:
    # Tourne tous les jours à 8h00 UTC : la fréquence RÉELLE d'envoi (quotidienne,
    # hebdomadaire, etc.) est choisie sur le site (⚙️ → Email récapitulatif des congés) et
    # appliquée par le script lui-même — GitHub Actions ne sait déclencher qu'un cron fixe.
    - cron: '0 8 * * *'
  workflow_dispatch: {} # bouton "Run workflow" dans l'onglet Actions, pour tester manuellement

jobs:
  send-recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Envoyer le récapitulatif par email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/send-weekly-recap.mjs
