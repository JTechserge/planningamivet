name: Email de réinitialisation du mot de passe

on:
  schedule:
    # Toutes les 5 minutes : un "Mot de passe oublié ?" doit recevoir son lien rapidement,
    # contrairement au récapitulatif des congés qui tolère un envoi une fois par jour.
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # bouton "Run workflow" dans l'onglet Actions, pour tester manuellement

jobs:
  send-reset-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Envoyer l'email de réinitialisation si une demande est en attente
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/send-password-reset-email.mjs
